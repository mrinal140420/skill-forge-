spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  datasource:
    url: jdbc:h2:file:${user.dir}/data/skillforgedb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=TRUE;AUTO_RECONNECT=TRUE;AUTO_SERVER=TRUE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: dev-secret-key-change-in-production-with-longer-key-1234567890abcdefghij
  expiration: 604800000

ml:
  base-url: http://localhost:8000
  request-timeout: 12000
  request-secret: ""

logging:
  level:
    root: INFO
    com.skillforge: DEBUG
    org.springframework.security: DEBUG
